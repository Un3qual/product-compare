schema {
  query: Query
  mutation: Mutation
}

interface Node {
  id: ID!
}

type Query {
  viewer: User
  product(slug: String!): Product
  products(first: Int, after: String, filters: ProductFiltersInput): ProductConnection!
  mySavedComparisonSets(first: Int, after: String): SavedComparisonSetConnection!
}

type Mutation {
  login(email: String!, password: String!): AuthSessionPayload!
  register(email: String!, password: String!): AuthSessionPayload!
  logout: LogoutPayload!
  forgotPassword(email: String!): AuthActionPayload!
  resetPassword(token: String!, password: String!): AuthActionPayload!
  verifyEmail(token: String!): AuthActionPayload!
  createSavedComparisonSet(input: CreateSavedComparisonSetInput!): CreateSavedComparisonSetPayload!
  deleteSavedComparisonSet(savedComparisonSetId: ID!): DeleteSavedComparisonSetPayload!
}

type AuthSessionPayload {
  viewer: User
  errors: [MutationError!]!
}

type LogoutPayload {
  ok: Boolean!
  errors: [MutationError!]!
}

type AuthActionPayload {
  ok: Boolean!
  errors: [MutationError!]!
}

type MutationError {
  code: String!
  message: String!
  field: String
}

type User implements Node {
  id: ID!
  email: String!
}

type Product implements Node {
  id: ID!
  name: String!
  slug: String!
  description: String
  brand: Brand!
}

type Brand implements Node {
  id: ID!
  name: String!
}

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

type SavedComparisonSetConnection {
  edges: [SavedComparisonSetEdge!]!
  pageInfo: PageInfo!
}

type SavedComparisonSetEdge {
  node: SavedComparisonSet!
  cursor: String!
}

type SavedComparisonSet implements Node {
  id: ID!
  name: String!
  items: [SavedComparisonItem!]!
}

type SavedComparisonItem {
  position: Int!
  product: Product!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

input CreateSavedComparisonSetInput {
  name: String!
  productIds: [ID!]!
}

input ProductNumericFilterInput {
  attributeId: ID!
  min: Decimal
  max: Decimal
}

input ProductBooleanFilterInput {
  attributeId: ID!
  value: Boolean!
}

input ProductEnumFilterInput {
  attributeId: ID!
  enumOptionId: ID!
}

input ProductFiltersInput {
  primaryTypeTaxonId: ID
  includeTypeDescendants: Boolean
  numeric: [ProductNumericFilterInput!]
  booleans: [ProductBooleanFilterInput!]
  enums: [ProductEnumFilterInput!]
  useCaseTaxonIds: [ID!]
}

"""
Decimal values are serialized as base-10 strings to preserve precision.
"""
scalar Decimal

type CreateSavedComparisonSetPayload {
  savedComparisonSet: SavedComparisonSet
  errors: [MutationError!]!
}

type DeleteSavedComparisonSetPayload {
  savedComparisonSet: SavedComparisonSet
  errors: [MutationError!]!
}
